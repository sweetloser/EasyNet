name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift-test:
    name: Swift Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test
